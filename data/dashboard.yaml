      <BR>
      <BR>
      <BR>
      <BR>
      <BR>
      <BR>
      <BR>

  - type: divider
    id: 6627143742873
  - id: 2790676343722
    type: template
    template: |-
      <div style="
        font-size: 24px;
        font-weight: 600;
        text-align: center;
      ">
        {% set n = states('sensor.lights_on_dashboard_counter_2') | int %}
        
        {% if n == 0 %}
          所有灯已关闭
        {% else %}
          当前有{{ n }}盏灯开着
        {% endif %}
      </div>
  - id: 2790676343733
    type: camera
    entity_id: camera.fornt_door_main
    stream: true
  - id: 2790676343744
    type: template
    template: |-
      <div style="
        display: flex;
        justify-content: center
        align-items: center;
        gap: 0px;
      ">

        <!-- 左：空调数量 -->
        <div style="
          text-align: center;
          min-width: 120px;
        ">
          <div style="
            font-size: 24px;
            font-weight: 700;
            color: #4fc3f7;
          ">
            ❄️ {{
              expand([
                'climate.208907219042894_climate',
                'climate.090615_cn_proxy_707764069_00005_ktp',
                'climate.090615_cn_proxy_707764069_00002_ktp',
                'climate.090615_cn_proxy_707764069_00004_ktp',
                'climate.xiaomi_cn_961342950_h09h00',
                'climate.090615_cn_proxy_707764069_00001_ktp',
                'climate.090615_cn_proxy_707764069_00003_ktp'
              ])
              | rejectattr('state','eq','off')
              | list
              | count
            }}
          </div>
        </div>

        <!-- 右：功率 -->
        <div style="
          text-align: center;
          min-width: 160px;
        ">
          <div style="
            font-size: 24px;
            font-weight: 700;
            color: #ffcc80;
          ">
            ⚡ {{
              (
                states('sensor.lxzn_cn_830223663_cbcsmj_electric_power_p_3_6') | float(0) +
                states('sensor.208907219042894_realtime_power') | float(0)
              ) | round(1)
            }} W
          </div>
        </div>

      </div>
