sidebar:
  - id: 3781246197457
    type: template
    template: |-
      <div style="text-align:center; font-size:64px;">
      {% set m = states('sensor.xin_xi_zhong_xi_yue_xiang_phase') %}

      {% if m in ['新月'] %}
      🌑
      {% elif m in ['娥眉月','蛾眉月'] %}
      🌒
      {% elif m in ['上弦月'] %}
      🌓
      {% elif m in ['盈凸月'] %}
      🌔
      {% elif m in ['满月'] %}
      🌕
      {% elif m in ['亏凸月'] %}
      🌖
      {% elif m in ['下弦月'] %}
      🌗
      {% elif m in ['残月'] %}
      🌘
      {% else %}
      🌙
      {% endif %}
      </div>
  - id: 2790676345913
    type: template
    template: |-
      <center>

      <div style="
      font-size:78px;
      font-weight:500;
      line-height:1;
      font-family:-apple-system,
      BlinkMacSystemFont,
      'Segoe UI',
      sans-serif;
      ">
      {{ states('sensor.time') }}
      </div>

      <div style="
      margin-top:10px;
      font-size:18px;
      opacity:.55;
      ">
      {{ now().strftime('%A') }}
       ·
      {{ states('sensor.date') }}
      </div>

      </center>
  - type: divider
    id: 3349273168863
  - id: 1506524483596
    type: template
    template: |-
      {% set v =
      states('sensor.chu_fang_kong_qi_jian_ce_fa_mei_ke_neng_xing')|float(0)
      %}

      <center>

      <div style="
      font-size:42px;
      line-height:1;
      margin-bottom:6px;
      ">

      {% if v<30 %}
      ☀️
      {% elif v<60 %}
      🌤️
      {% elif v<80 %}
      💧
      {% else %}

      {% endif %}

      </div>

      <div style="
      font-size:28px;
      font-weight:600;
      ">

      </div>

      <div style="
      margin-top:6px;
      font-size:28px;
      opacity:.55;
      ">

      {% if v<30 %}
      发霉？这辈子都不可能
      {% elif v<60 %}
      再不开窗，我长毛啦
      {% elif v<80 %}
      发霉准备中
      {% else %}
      正在发霉中
      {% endif %}


      </center>
